<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social Physics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#17171a;--surface2:#1e1e22;--surface3:#26262c;
  --border:#2e2e36;--border2:#3a3a44;
  --text:#f0eff0;--text2:#9998a8;--text3:#5c5b6e;
  --accent:#e8503a;--accent2:#f07050;
  --gold:#d4a843;--blue:#4a8fd4;--green:#5fa86b;--purple:#9b7fe8;
  --red-agent:#e8503a;--brown-agent:#c4894a;--blue-agent:#4a8fd4;--green-agent:#5fa86b;
  --radius:10px;--radius-lg:16px;
  --font-body:'DM Sans',sans-serif;
  --font-serif:'Instrument Serif',serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh}

.header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:var(--font-serif);font-size:22px;color:var(--text);letter-spacing:-0.5px}
.logo em{color:var(--accent);font-style:italic}
.topic-form{display:flex;gap:8px;flex:1;max-width:520px}
.topic-form input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:8px 14px;font-size:13px;font-family:var(--font-body);outline:none;transition:border-color .2s}
.topic-form input:focus{border-color:var(--accent)}
.topic-form input::placeholder{color:var(--text3)}
.btn-start{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:8px 18px;font-size:13px;font-family:var(--font-body);font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s,transform .1s}
.btn-start:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-start:active{transform:translateY(0)}

.main{display:grid;grid-template-columns:280px 1fr 260px;gap:0;flex:1;overflow:hidden}

.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-right{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-section{padding:16px;border-bottom:1px solid var(--border)}
.panel-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}

.global-belief{text-align:center;padding:20px 16px}
.belief-number{font-family:var(--font-serif);font-size:64px;line-height:1;color:var(--text);margin-bottom:4px}
.belief-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.big-meter{height:8px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:12px}
.big-meter-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--gold),var(--blue))}
.mood-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--border2)}
.mood-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.chart-wrap{padding:12px 16px 16px}
canvas{width:100%;height:100px;border-radius:8px;background:var(--surface2);display:block}

.btn-debate{margin:0 16px 16px;width:calc(100% - 32px);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);padding:10px;font-size:13px;font-family:var(--font-body);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-debate:hover{border-color:var(--accent);color:var(--accent)}
.btn-debate svg{width:14px;height:14px;flex-shrink:0}

.center-panel{display:flex;flex-direction:column;overflow:hidden}
.agents-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.agents-header h2{font-family:var(--font-serif);font-size:18px;font-weight:400}
.turn-badge{background:var(--surface2);border:1px solid var(--border2);border-radius:99px;padding:3px 12px;font-size:12px;color:var(--text2)}
.agents-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px;overflow-y:auto;flex:1}

.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;position:relative;overflow:hidden;transition:border-color .3s}
.agent-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--agent-color);border-radius:3px 0 0 3px}
.agent-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.agent-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.2}
.agent-role{font-size:11px;color:var(--text3);margin-top:2px}
.agent-delta{font-size:16px;font-weight:700;min-width:36px;text-align:right}
.agent-delta.pos{color:var(--green)}
.agent-delta.neg{color:var(--accent)}
.agent-meter{height:4px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:6px}
.agent-meter-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.agent-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.agent-belief-pct{color:var(--text2);font-weight:500}
.agent-quote{margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.4;font-style:italic;min-height:44px;border-left:2px solid var(--agent-color)}

.intervention-panel{padding:16px}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:12px;background:var(--surface2);border-radius:var(--radius);padding:3px}
.tab{background:transparent;border:none;border-radius:7px;color:var(--text3);padding:7px 4px;font-size:12px;font-family:var(--font-body);font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2)}
.target-select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:8px 10px;font-size:12px;font-family:var(--font-body);outline:none;margin-bottom:8px;display:none}
.target-select.show{display:block}
textarea.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;font-family:var(--font-body);resize:none;outline:none;line-height:1.5;min-height:110px;transition:border-color .2s;margin-bottom:8px}
textarea.input:focus{border-color:var(--accent)}
textarea.input::placeholder{color:var(--text3)}
.btn-send{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-size:13px;font-family:var(--font-body);font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:10px}
.btn-send:hover{background:var(--accent2)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.hint-box{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--text3);line-height:1.5}
.hint-icon{font-size:16px;margin-bottom:4px}

.log-panel{display:flex;flex-direction:column;overflow:hidden}
.log-header{padding:14px 20px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.log-scroll{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.log-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.log-entry-title{font-size:12px;font-weight:600;color:var(--text)}
.log-entry-turn{font-size:10px;color:var(--text3)}
.log-body{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.log-world{font-size:11px;color:var(--text3);line-height:1.4;padding:6px 8px;background:var(--surface2);border-radius:6px;margin-bottom:8px}
.log-responses{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.log-quote{background:var(--surface2);border-radius:7px;padding:8px;border-left:2px solid var(--qcolor,#555)}
.log-quote-name{font-size:10px;font-weight:600;color:var(--text3);display:flex;justify-content:space-between}
.log-quote-delta{font-size:10px;font-weight:700}
.log-quote-text{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.35;font-style:italic}
.log-system{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--text3);text-align:center}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.reasoning-entry{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.reasoning-name{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.reasoning-text{font-size:11px;color:var(--text3);line-height:1.45}

@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .panel-left,.panel-right{border-right:none;border-left:none;border-bottom:1px solid var(--border)}
  .agents-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="logo">Social <em>Physics</em></div>
    <form class="topic-form" id="topicForm">
      <input id="topicInput" maxlength="80" value="AI regulation" placeholder="Enter a debate topic…" autocomplete="off">
      <button type="submit" class="btn-start">Start simulation</button>
    </form>
  </header>
  <div class="main">
    <aside class="panel-left">
      <div class="global-belief">
        <div class="belief-number" id="globalNum">—</div>
        <div class="belief-label">Global belief</div>
        <div class="big-meter"><div class="big-meter-fill" id="globalMeter" style="width:0%"></div></div>
        <div class="mood-pill" id="moodPill" style="margin:0 auto;">
          <span class="mood-dot" id="moodDot"></span>
          <span id="moodLabel">waiting</span>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="panel-label">Belief over time</div>
        <canvas id="histChart" width="248" height="100"></canvas>
      </div>
      <button class="btn-debate" id="stepBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        Let agents debate
      </button>
      <div class="panel-section" style="flex:1;overflow-y:auto">
        <div class="panel-label">Why it changed</div>
        <div id="reasoningBox"></div>
      </div>
    </aside>

    <div class="center-panel">
      <div class="agents-header">
        <h2>The Room</h2>
        <span class="turn-badge" id="turnBadge">Turn 0</span>
      </div>
      <div class="agents-grid" id="agentsGrid"></div>
      <div class="log-panel" style="height:260px;border-top:1px solid var(--border)">
        <div class="log-header">Live debate log</div>
        <div class="log-scroll" id="logScroll"></div>
      </div>
    </div>

    <aside class="panel-right">
      <div class="intervention-panel">
        <div class="panel-label" style="margin-bottom:10px">You — the 5th force</div>
        <div class="tabs" id="tabs">
          <button class="tab active" data-kind="argument">Argument</button>
          <button class="tab" data-kind="event">Event</button>
          <button class="tab" data-kind="persuasion">Persuade</button>
        </div>
        <select id="targetSelect" class="target-select">
          <option value="">Select target…</option>
        </select>
        <textarea class="input" id="inputText" rows="5" placeholder="What if open rules create more trust than bans?"></textarea>
        <button class="btn-send" id="sendBtn" disabled>Apply force</button>
        <div class="hint-box" id="hintBox">
          <div class="hint-icon">💬</div>
          Your argument becomes a force with its own weight and dimension score.
        </div>
      </div>
    </aside>
  </div>
</div>

<script>
const AGENTS = [
  {id:'activist',name:'Activist',role:'Moral urgency & collective action',base:76,vol:1.22,color:'#e8503a',
   trust:{evidence:.9,rights:1.25,stability:.35,authority:.45,popularity:.72}},
  {id:'traditionalist',name:'Traditionalist',role:'Continuity, caution & social costs',base:34,vol:.74,color:'#c4894a',
   trust:{evidence:.62,rights:.35,stability:1.28,authority:.82,popularity:.5}},
  {id:'observer',name:'Neutral Observer',role:'Evidence, uncertainty & second-order effects',base:52,vol:.9,color:'#4a8fd4',
   trust:{evidence:1.2,rights:.72,stability:.72,authority:.66,popularity:.45}},
  {id:'authority',name:'Authority Figure',role:'Legitimacy, institutions & public pressure',base:48,vol:.82,color:'#5fa86b',
   trust:{evidence:.95,rights:.55,stability:.92,authority:1.15,popularity:.9}}
];

const STANCES = {
  activist:{
    high:["The old consensus is already breaking. Delay is a choice with consequences.","People closest to the harm should not need permission to be believed."],
    mid:["This could move, but pressure has to be public enough to make neutrality costly.","The question is not whether change is comfortable—it's whether the current system is defensible."],
    low:["I'm not convinced the room understands the stakes yet. The moral case needs sharper force.","If the public can't see who is harmed, the status quo keeps winning by default."]
  },
  traditionalist:{
    high:["I can accept reform when the guardrails are visible and the costs are named.","The case is becoming harder to dismiss, but speed still matters."],
    mid:["I need proof that this won't damage institutions people rely on.","Good intentions are not a plan. What happens after the slogan?"],
    low:["This feels like pressure without responsibility. I'm digging in until the risks are answered.","Societies can break things faster than they can repair them."]
  },
  observer:{
    high:["The evidence and public mood are converging. Resistance now needs a stronger factual basis.","Belief is moving because the claims are becoming testable, not just emotional."],
    mid:["The system is unstable. One strong event or argument could tip the average belief.","Both sides are supplying partial truths. The uncertainty is still doing real work."],
    low:["The debate is producing more heat than information. I'd expect defensive sorting next.","Without clearer evidence, people are updating from identity more than facts."]
  },
  authority:{
    high:["A policy window is opening. Public legitimacy is moving faster than institutions.","The pressure is now broad enough that leadership has to respond."],
    mid:["I'm watching whether this becomes durable public demand or a temporary surge.","Any action needs a coalition, not just a winning argument."],
    low:["The political risk still outweighs the mandate. I'd wait.","If this becomes polarizing, institutions will choose containment over endorsement."]
  }
};

const DIMS = {
  evidence:["study","data","proof","research","expert","science","scientific","measurable","record"],
  rights:["equal","fair","rights","justice","dignity","freedom","harm","voice","workforce"],
  stability:["risk","cost","tradition","family","jobs","order","stability","security","disruption"],
  authority:["law","court","government","official","policy","institution","leader","regulation"],
  popularity:["viral","protest","movement","public","media","crowd","election","majority"]
};

const HINTS = {
  argument:{icon:'💬',text:"Your argument becomes a new social force with its own influence weight and dimension score."},
  event:{icon:'⚡',text:"Events hit every agent at once, but each role interprets the shock differently based on their trust profile."},
  persuasion:{icon:'🎯',text:"Targeted persuasion amplifies your effect on one agent and reveals their internal reasoning in detail."}
};

const PLACEHOLDERS = {
  argument:"What if open rules create more trust than bans?",
  event:"A major protest occurs after leaked documents reveal hidden costs.",
  persuasion:"A cautious policy can protect people without freezing progress."
};

const clamp=(v,lo=0,hi=100)=>Math.max(lo,Math.min(hi,v));
const rnd=v=>Math.round(v);
const pick=(arr,i)=>arr[Math.abs(i)%arr.length];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let state={session:null,kind:'argument'};

function scoreText(text){
  const low=text.toLowerCase();
  const s=Object.fromEntries(Object.keys(DIMS).map(k=>[k,0]));
  for(const[dim,words]of Object.entries(DIMS))for(const w of words)if(low.includes(w))s[dim]++;
  if(!Object.values(s).some(Boolean)){s.evidence=.55;s.rights=.55;}
  return s;
}

function textTilt(text){
  const low=text.toLowerCase();
  const neg=["ban","danger","threat","collapse","fear","crisis","scandal","backlash","fraud","violence"];
  const pos=["equal","benefit","safe","progress","opportunity","protect","improve","breakthrough","support"];
  return clamp(.5+(pos.filter(w=>low.includes(w)).length-neg.filter(w=>low.includes(w)).length)*.13,.18,.82);
}

function makeSession(topic){
  const seed=topic.split('').reduce((s,c)=>s+c.charCodeAt(0),0);
  const agents=AGENTS.map((bp,i)=>{
    const drift=((seed+i*17)%13)-6;
    return{...bp,belief:clamp(bp.base+drift),resistance:bp.id==='traditionalist'?64:bp.id==='authority'?52:38,lastDelta:0,quote:'Initial position formed from role incentives.',reasoning:'Waiting for the first intervention.'};
  });
  return{topic,turn:0,mood:'open',globalBelief:avg(agents),agents,log:[{type:'system',body:`Simulation started: "${topic}"`,turn:0}],history:[snap(agents,0,'Start')]};
}

function avg(agents){return rnd(agents.reduce((s,a)=>s+a.belief,0)/agents.length);}
function snap(agents,turn,label){return{turn,label,gb:avg(agents),vals:Object.fromEntries(agents.map(a=>[a.id,rnd(a.belief)]))};}

function applyInfluence(agent,scores,tilt,weight,mode,targetId){
  const trust=Object.entries(scores).reduce((s,[d,sc])=>s+sc*agent.trust[d],0);
  const total=Object.values(scores).reduce((s,v)=>s+v,0)||1;
  const normTrust=trust/total;
  const dir=(tilt-.5)*2;
  const targetBoost=targetId===agent.id?1.7:1;
  const modeBoost=mode==='event'?1.25:mode==='persuasion'?1.45:1;
  const resDrag=1-agent.resistance/160;
  const delta=dir*weight*normTrust*agent.vol*targetBoost*modeBoost*resDrag;
  const snap=Math.abs(delta)>8?Math.sign(delta)*-agent.resistance*.025:0;
  return delta+snap;
}

function runTurn(session,action){
  session.turn++;
  const scores=scoreText(action.text);
  const tilt=action.kind==='event'?clamp(textTilt(action.text)+.04,.12,.88):textTilt(action.text);
  const weight=action.kind==='argument'?12:action.kind==='event'?16:10;
  const before=session.globalBelief;
  const responses=[];

  session.agents=session.agents.map((agent,i)=>{
    const delta=applyInfluence(agent,scores,tilt,weight,action.kind,action.targetId);
    const newBelief=clamp(agent.belief+delta);
    const band=newBelief>62?'high':newBelief<38?'low':'mid';
    const line=pick(STANCES[agent.id][band],session.turn+i);
    const changed=rnd(newBelief-agent.belief);
    const strongest=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
    const leaning=changed>2?'moved toward support':changed<-2?'resisted and pulled back':'barely moved';
    const targetNote=action.targetId===agent.id?' Direct attention amplified the update.':'';
    const reasoning=`${agent.name} ${leaning} — the "${strongest}" signal matched their trust profile at ${rnd(agent.trust[strongest]*100)}%.${action.kind==='event'?' Events hit harder than arguments.':' Arguments update through credibility.'}${targetNote}`;
    responses.push({id:agent.id,name:agent.name,color:agent.color,line,delta:changed,belief:rnd(newBelief),reasoning});
    return{...agent,belief:newBelief,lastDelta:changed,quote:line,reasoning,
      resistance:clamp(agent.resistance+(Math.abs(changed)>6?5:-2),18,86)};
  });

  session.globalBelief=avg(session.agents);
  const spread=Math.max(...session.agents.map(a=>a.belief))-Math.min(...session.agents.map(a=>a.belief));
  const intensity=Math.abs(session.globalBelief-before);
  if(spread>26)session.mood='polarized';
  else if(intensity>16)session.mood='charged';
  else if(session.globalBelief>62)session.mood='receptive';
  else if(session.globalBelief<38)session.mood='defensive';
  else session.mood='open';

  const gDelta=session.globalBelief-before;
  const dir=gDelta>0?'raised':gDelta<0?'lowered':'held';
  const moodText={polarized:'The room polarized: agents updated in opposite directions.',charged:'The room became charged: your input created visible movement.',receptive:'The room became receptive: agents are treating change as legitimate.',defensive:'The room went defensive: the intervention increased caution.',open:'The room stayed open: beliefs shifted without hardening.'}[session.mood];
  const worldReact=`Your ${action.kind} ${dir} global belief by ${Math.abs(gDelta)} pts. ${moodText} Spread: ${rnd(spread)} pts.`;

  const title=action.kind==='argument'?'Your argument':action.kind==='event'?'Event injected':'Targeted persuasion';
  session.log.unshift({type:action.kind,title,body:action.text,turn:session.turn,gDelta,worldReact,responses,targetId:action.targetId||null});
  session.history.push(snap(session.agents,session.turn,title));
  return session;
}

function debateStep(session){
  return runTurn(session,{kind:'debate',text:session.globalBelief>55?'The conversation absorbs recent pressure and tests whether support can become consensus.':'The conversation probes uncertainty, risk, and whether the case for change is durable.',targetId:null});
}

const MOOD_COLORS={polarized:'#e8503a',charged:'#d4a843',receptive:'#5fa86b',defensive:'#9b7fe8',open:'#4a8fd4'};

function render(){
  const s=state.session;
  if(!s)return;
  document.getElementById('globalNum').textContent=s.globalBelief+'%';
  document.getElementById('globalMeter').style.width=s.globalBelief+'%';
  document.getElementById('moodDot').style.background=MOOD_COLORS[s.mood]||'#888';
  document.getElementById('moodLabel').textContent=s.mood;
  document.getElementById('turnBadge').textContent='Turn '+s.turn;
  renderAgents(s);
  renderLog(s);
  renderReasoning(s);
  drawChart(s.history,s.agents);
  document.getElementById('sendBtn').disabled=false;
}

function renderAgents(s){
  document.getElementById('agentsGrid').innerHTML=s.agents.map(a=>`
    <div class="agent-card" style="--agent-color:${a.color}">
      <div class="agent-top">
        <div><div class="agent-name">${esc(a.name)}</div><div class="agent-role">${esc(a.role)}</div></div>
        <div class="agent-delta ${a.lastDelta>0?'pos':a.lastDelta<0?'neg':''}">${a.lastDelta>0?'+':''}${a.lastDelta}</div>
      </div>
      <div class="agent-meter"><div class="agent-meter-fill" style="width:${rnd(a.belief)}%;background:${a.color}"></div></div>
      <div class="agent-stats"><span class="agent-belief-pct">${rnd(a.belief)}%</span><span>resist ${rnd(a.resistance)}%</span></div>
      <div class="agent-quote">"${esc(a.quote)}"</div>
    </div>
  `).join('');
}

function renderLog(s){
  document.getElementById('logScroll').innerHTML=s.log.map(e=>{
    if(e.type==='system')return`<div class="log-system">${esc(e.body)}</div>`;
    const resHtml=e.responses?`<div class="log-responses">${e.responses.map(r=>`
      <div class="log-quote" style="--qcolor:${r.color}">
        <div class="log-quote-name"><span>${esc(r.name)}</span><span class="log-quote-delta" style="color:${r.delta>0?'#5fa86b':'#e8503a'}">${r.delta>0?'+':''}${r.delta}</span></div>
        <div class="log-quote-text">${esc(r.line)}</div>
      </div>`).join('')}</div>`:'';
    return`<div class="log-entry">
      <div class="log-entry-head"><span class="log-entry-title">${esc(e.title)}</span><span class="log-entry-turn">T${e.turn}</span></div>
      <div class="log-body">${esc(e.body)}</div>
      ${e.worldReact?`<div class="log-world">${esc(e.worldReact)}</div>`:''}
      ${resHtml}
    </div>`;
  }).join('');
}

function renderReasoning(s){
  document.getElementById('reasoningBox').innerHTML=s.agents.map(a=>`
    <div class="reasoning-entry">
      <div class="reasoning-name" style="color:${a.color}">${esc(a.name)}</div>
      <div class="reasoning-text">${esc(a.reasoning)}</div>
    </div>`).join('');
}

function drawChart(history,agents){
  const canvas=document.getElementById('histChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1e1e22';ctx.fillRect(0,0,W,H);
  if(history.length<2)return;
  const agentIds=['activist','traditionalist','observer','authority'];
  const agentColors={activist:'#e8503a',traditionalist:'#c4894a',observer:'#4a8fd4',authority:'#5fa86b'};
  for(const id of agentIds){
    ctx.strokeStyle=agentColors[id]+'66';ctx.lineWidth=1;ctx.beginPath();
    history.forEach((pt,i)=>{
      const x=8+(i/(history.length-1))*(W-16);
      const y=H-6-(((pt.vals&&pt.vals[id])||0)/100)*(H-12);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  ctx.strokeStyle='#e8503a';ctx.lineWidth=2.5;ctx.beginPath();
  history.forEach((pt,i)=>{
    const x=8+(i/(history.length-1))*(W-16);
    const y=H-6-(pt.gb/100)*(H-12);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  const last=history[history.length-1];
  const lx=W-8,ly=H-6-(last.gb/100)*(H-12);
  ctx.fillStyle='#e8503a';ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fill();
}

function startSim(topic){
  state.session=makeSession(topic||'AI regulation');
  render();
}

function doIntervene(){
  const text=document.getElementById('inputText').value.trim();
  if(!text||!state.session)return;
  const targetId=state.kind==='persuasion'?document.getElementById('targetSelect').value:null;
  state.session=runTurn(state.session,{kind:state.kind,text,targetId:targetId||null});
  document.getElementById('inputText').value='';
  render();
}

function doStep(){
  if(!state.session)return;
  state.session=debateStep(state.session);
  render();
}

document.getElementById('topicForm').addEventListener('submit',e=>{
  e.preventDefault();
  startSim(document.getElementById('topicInput').value.trim());
});
document.getElementById('sendBtn').addEventListener('click',doIntervene);
document.getElementById('stepBtn').addEventListener('click',doStep);
document.getElementById('inputText').addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter')doIntervene();
});
document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');
  if(!btn)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  state.kind=btn.dataset.kind;
  const sel=document.getElementById('targetSelect');
  sel.classList.toggle('show',state.kind==='persuasion');
  const h=HINTS[state.kind];
  document.getElementById('hintBox').innerHTML=`<div class="hint-icon">${h.icon}</div>${h.text}`;
  document.getElementById('inputText').placeholder=PLACEHOLDERS[state.kind];
  if(state.kind==='persuasion'&&state.session){
    sel.innerHTML=state.session.agents.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('');
  }
});

startSim('AI regulation');
</script>
</body>
</html>
